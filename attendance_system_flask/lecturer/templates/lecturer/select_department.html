{% extends "base.html" %}

{% block title %}Select Department{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0">Select Department</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="department_id" class="form-label">Choose Department</label>
                        <select class="form-select" id="department_id" name="department_id" required>
                            <option value="">-- Select Department --</option>
                            {% for dept in departments %}
                            <option value="{{ dept.id }}">{{ dept.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-info">Continue to Dashboard</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
